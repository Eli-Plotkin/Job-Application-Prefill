# Apply Assistant — Stage-2 semantic matcher eval.
# Runs v1 (batched) and v2 (per-question) side by side for direct comparison.
# Run: npm run eval:matcher   (needs ANTHROPIC_API_KEY in your environment)
description: Apply Assistant semantic matcher — v1 (batched) vs v2 (per-question)

prompts:
  - label: "matcher"
    raw: "unused"  # both custom providers build their own prompts from src/lib/matcher.js

providers:
  - id: file://provider-v1.js  # v1 — single batched call
  - id: file://provider-v2.js  # v2 — one parallel call per question

defaultTest:
  assert:
    - type: javascript
      value: file://matcher-assert.js

tests: file://tests.yaml
