# Apply Assistant — Stage-2 semantic matcher eval.
# Runs v1 (batched) and v2 (per-question) side by side for direct comparison.
# Run: npm run eval:matcher   (needs ANTHROPIC_API_KEY in your environment)
description: Apply Assistant semantic matcher — single batched Stage-2 call

prompts:
  - label: "matcher"
    raw: "unused"  # provider builds its own prompts from src/lib/matcher.js

providers:
  - id: file://provider-v1.js  # single batched call

defaultTest:
  assert:
    - type: javascript
      value: file://matcher-assert.js

tests: file://tests.yaml
