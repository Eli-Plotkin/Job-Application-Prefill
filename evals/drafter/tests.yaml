# =============================================================================
# Write-with-AI drafter test cases — SCAFFOLD ONLY. Fill these in by hand.
#
# Each test supplies:
#   question      : the application question
#   resume_text   : sample resume text used as context
#   blurb         : sample about-me blurb (the applicant's voice)
#   previous_draft: (rewrite cases only) the prior draft to revise
#   guidance      : (rewrite cases only) the user's revision guidance
#
# The first case below is live (and will FAIL until filled in — placeholder text
# trips the not-contains assertion). The commented skeletons show a first-draft
# case and a rewrite case.
# =============================================================================

